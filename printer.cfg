[gcode_macro JOG_X_MINUS]
gcode:
    {% set dist = params.DISTANCE|default(1)|float %}
    {% set spd = params.SPEED|default(50)|float %}
    MOVE_X DISTANCE={-dist} SPEED={spd}

[gcode_macro JOG_Y_PLUS]
gcode:
    {% set dist = params.DISTANCE|default(1)|float %}
    {% set spd = params.SPEED|default(50)|float %}
    MOVE_Y DISTANCE={dist} SPEED={spd}

[gcode_macro JOG_Y_MINUS]
gcode:
    {% set dist = params.DISTANCE|default(1)|float %}
    {% set spd = params.SPEED|default(50)|float %}
    MOVE_Y DISTANCE={-dist} SPEED={spd}

[gcode_macro JOG_Z_PLUS]
gcode:
    {% set dist = params.DISTANCE|default(1)|float %}
    {% set spd = params.SPEED|default(20)|float %}
    MOVE_Z DISTANCE={dist} SPEED={spd}

[gcode_macro JOG_Z_MINUS]
gcode:
    {% set dist = params.DISTANCE|default(1)|float %}
    {% set spd = params.SPEED|default(20)|float %}
    MOVE_Z DISTANCE={-dist} SPEED={spd}

[gcode_macro JOG_B_PLUS]
gcode:
    {% set dist = params.DISTANCE|default(5)|float %}
    {% set spd = params.SPEED|default(20)|float %}
    {% set cur_b = printer["gcode_macro _POSITIONS"].b_deg %}
    ROTATE_B B={cur_b + dist} SPEED={spd}

[gcode_macro JOG_B_MINUS]
gcode:
    {% set dist = params.DISTANCE|default(5)|float %}
    {% set spd = params.SPEED|default(20)|float %}
    {% set cur_b = printer["gcode_macro _POSITIONS"].b_deg %}
    ROTATE_B B={cur_b - dist} SPEED={spd}

[gcode_macro JOG_C_PLUS]
