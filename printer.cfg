    # MANUAL_STEPPER STEPPER=z_axis ENABLE=0  # Disabled to keep Z locked
    # MANUAL_STEPPER STEPPER=c_axis ENABLE=0  # Disabled to keep C locked
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_x VALUE=False
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_y VALUE=False
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_z VALUE=False
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_b VALUE=False

