    SET_STEPPER_ENABLE STEPPER=stepper_y ENABLE=1
    SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=1
    MANUAL_STEPPER STEPPER=z_axis ENABLE=1
    MANUAL_STEPPER STEPPER=c_axis ENABLE=1

############################################################
# PRINT MACROS
############################################################

[gcode_macro M104]
rename_existing: M104.1
gcode:
    {% if printer["gcode_macro _DRYRUN"].enabled %}
        M117 DRYRUN skip M104
    {% else %}
        M104.1 {rawparams}
    {% endif %}

[gcode_macro M109]
rename_existing: M109.1
gcode:
    {% if printer["gcode_macro _DRYRUN"].enabled %}
        M117 DRYRUN skip M109
    {% else %}
        M109.1 {rawparams}
    {% endif %}

[gcode_macro M140]
rename_existing: M140.1
gcode:
    {% if printer["gcode_macro _DRYRUN"].enabled %}
        M117 DRYRUN skip M140
    {% else %}
        M140.1 {rawparams}
    {% endif %}

[gcode_macro M190]
rename_existing: M190.1
gcode:
    {% if printer["gcode_macro _DRYRUN"].enabled %}
        M117 DRYRUN skip M190
    {% else %}
        M190.1 {rawparams}
    {% endif %}

[gcode_macro START_PRINT]
gcode:
    {% set BED = params.BED_TEMP|default(60)|float %}
    {% set EXT = params.EXTRUDER_TEMP|default(200)|float %}
    
    # 1. Start heating bed, but don't wait yet
    M140 S{BED}
    M104 S150 
    
    # 2. Home all axes
    G28
    
    # 3. Wait for final temperatures
    M190 S{BED}
    M109 S{EXT}
    
    # 4. Safe lift before starting the toolpath
    MOVE_Z DISTANCE=5 SPEED=20
    M117 Print Started

[gcode_macro END_PRINT]
gcode:
    # 1. Reset the absolute extruder counter to 0
    G92 E0 
    
    # 2. Now retract 2mm safely
    G1 E-2 F300 
    
    # 3. Raise the toolhead quickly by 10mm to save the print
    G91
    G1 Z10 F1500
    G90
    
    # 4. Turn off heaters
    M104 S0
    M140 S0
    
    # 5. Lock the bed and C-axis
    Z_LOCK
    C_LOCK

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # 1. Memorize exact virtual coordinates before pause engages
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_x VALUE={printer.toolhead.position.x}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_y VALUE={printer.toolhead.position.z}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_z VALUE={printer["gcode_macro _POSITIONS"].z_height}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_b VALUE={printer["gcode_macro _POSITIONS"].b_deg}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=saved_c VALUE={printer["gcode_macro _POSITIONS"].c_deg}
    
    # 2. Execute base pause routines
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_saved_x: 0.0
variable_saved_y: 0.0
variable_saved_z: 0.0
variable_saved_b: 0.0
variable_saved_c: 0.0
gcode:
    # 1. Force absolute mode just in case UI left us floating in relative
    G90 
    
    # 2. Explicitly move toolhead back! First X, Y, B, C...
    G1 X{saved_x} Y{saved_y} B{saved_b} C{saved_c} F3000
    
    # 3. Then safely drop Z back down to exact memory slot
    G1 Z{saved_z} F1500
    
    # 4. Restore state purely to sync Klipper, but skip its native physical move (MOVE=0)
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=0
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    END_PRINT
    BASE_CANCEL_PRINT

############################################################
# MISC SYSTEM CONTROLS
############################################################

[display_status]
[pause_resume]
[respond]

# [output_pin air_pump_relay]
# pin: !PE11
# value: 0
# shutdown_value: 0

[gcode_macro AIR_PUMP_ON]
gcode:
    SET_PIN PIN=air_pump_relay VALUE=1

[gcode_macro AIR_PUMP_OFF]
gcode:
    SET_PIN PIN=air_pump_relay VALUE=0

[idle_timeout]
timeout: 86400
gcode:
    TURN_OFF_HEATERS
    Z_LOCK
    C_LOCK

############################################################
# AXIS LIMIT TEST MACROS
############################################################

[gcode_macro TEST_MAX_X]
description: Sweep X at chosen feedrate. Example: TEST_MAX_X F=12000 PASSES=3
gcode:
    {% set f = params.F|default(12000)|int %}
    {% set passes = params.PASSES|default(3)|int %}
    {% for _ in range(passes) %}
        G90
        G1 X-151.5 F{f}
        G1 X128.5 F{f}
    {% endfor %}

[gcode_macro TEST_MAX_Y]
description: Sweep Y at chosen feedrate. Example: TEST_MAX_Y F=12000 PASSES=3
gcode:
    {% set f = params.F|default(12000)|int %}
    {% set passes = params.PASSES|default(3)|int %}
    {% for _ in range(passes) %}
        G90
        G1 Y-134.0 F{f}
        G1 Y86.0 F{f}
    {% endfor %}

[gcode_macro TEST_MAX_Z]
description: Sweep Z at chosen feedrate. Example: TEST_MAX_Z F=1200 PASSES=2
gcode:
    {% set f = params.F|default(1200)|int %}
    {% set passes = params.PASSES|default(2)|int %}
    {% for _ in range(passes) %}
        G90
        G1 Z20 F{f}
        G1 Z200 F{f}
    {% endfor %}

[gcode_macro TEST_MAX_B]
description: Sweep B at chosen feedrate. Example: TEST_MAX_B F=6000 PASSES=3
gcode:
    {% set f = params.F|default(6000)|int %}
    {% set passes = params.PASSES|default(3)|int %}
    {% for _ in range(passes) %}
        G90
        G1 B-90 F{f}
        G1 B90 F{f}
    {% endfor %}

[gcode_macro TEST_MAX_C]
description: Sweep C at chosen feedrate. Example: TEST_MAX_C F=12000 PASSES=3
gcode:
    {% set f = params.F|default(12000)|int %}
    {% set passes = params.PASSES|default(3)|int %}
    {% for _ in range(passes) %}
        G90
        G1 C0 F{f}
        G1 C360 F{f}
    {% endfor %}

[gcode_macro TEST_ACCEL_X]
description: Raise printer accel temporarily and sweep X. Example: TEST_ACCEL_X ACCEL=4000 F=12000
gcode:
    {% set accel = params.ACCEL|default(4000)|int %}
    {% set f = params.F|default(12000)|int %}
    SET_VELOCITY_LIMIT ACCEL={accel}
    TEST_MAX_X F={f} PASSES=4

[gcode_macro TEST_ACCEL_Y]
description: Raise printer accel temporarily and sweep Y. Example: TEST_ACCEL_Y ACCEL=3000 F=12000
gcode:
    {% set accel = params.ACCEL|default(3000)|int %}
    {% set f = params.F|default(12000)|int %}
    SET_VELOCITY_LIMIT ACCEL={accel}
    TEST_MAX_Y F={f} PASSES=4

[gcode_macro TEST_ACCEL_Z]
description: Raise printer accel temporarily and sweep Z. Example: TEST_ACCEL_Z ACCEL=500 F=1200
gcode:
    {% set accel = params.ACCEL|default(500)|int %}
    {% set f = params.F|default(1200)|int %}
    SET_VELOCITY_LIMIT ACCEL={accel}
    TEST_MAX_Z F={f} PASSES=3

[gcode_macro TEST_ACCEL_B]
description: Raise printer accel temporarily and sweep B. Example: TEST_ACCEL_B ACCEL=2500 F=6000
gcode:
    {% set accel = params.ACCEL|default(2500)|int %}
    {% set f = params.F|default(6000)|int %}
    SET_VELOCITY_LIMIT ACCEL={accel}
    TEST_MAX_B F={f} PASSES=4

[gcode_macro TEST_ACCEL_C]
description: Raise C axis limits temporarily. Example: TEST_ACCEL_C F=18000 PASSES=4
gcode:
    {% set f = params.F|default(18000)|int %}
    {% set passes = params.PASSES|default(4)|int %}
    TEST_MAX_C F={f} PASSES={passes}

[gcode_macro SHOW_LIMIT_HINTS]
description: Show suggested starting values for tuning
gcode:
    {action_respond_info("Start safe: X/Y F12000, B F6000, C F12000, Z F1200")}
    {action_respond_info("Then raise one axis at a time until missed steps, grinding, or unreliable homing appears")}
    {action_respond_info("Extra-axis C is clamped by MANUAL_STEPPER GCODE_AXIS limits and [manual_stepper c_axis] velocity/accel")}

[gcode_macro APPLY_80_PERCENT_LIMITS]
description: Store 80% of found max feedrate. Example APPLY_80_PERCENT_LIMITS X=17000 B=10000 C=12000
gcode:
    {% if 'X' in params %}
        SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=x_f VALUE={params.X|float * 0.8}
    {% endif %}
    {% if 'Y' in params %}
        SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=y_f VALUE={params.Y|float * 0.8}
    {% endif %}
    {% if 'Z' in params %}
        SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=z_f VALUE={params.Z|float * 0.8}
    {% endif %}
    {% if 'B' in params %}
        SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=b_f VALUE={params.B|float * 0.8}
    {% endif %}
    {% if 'C' in params %}
        SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=c_f VALUE={params.C|float * 0.8}
    {% endif %}
    SHOW_TUNED_LIMITS

[gcode_macro SHOW_TUNED_LIMITS]
description: Show active user-axis feed caps in mm/min
gcode:
    {% set t = printer["gcode_macro _TUNED_LIMITS"] %}
    {action_respond_info("Caps F(mm/min): X=%.0f Y=%.0f Z=%.0f B=%.0f C=%.0f" % (t.x_f, t.y_f, t.z_f, t.b_f, t.c_f))}

[gcode_macro CLEAR_TUNED_LIMITS]
description: Remove user-axis feed caps
gcode:
    SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=x_f VALUE=999999
    SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=y_f VALUE=999999
    SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=z_f VALUE=999999
    SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=b_f VALUE=999999
    SET_GCODE_VARIABLE MACRO=_TUNED_LIMITS VARIABLE=c_f VALUE=999999
    SHOW_TUNED_LIMITS

[gcode_macro RAMP_X_SPEED]
description: Increase X speed step by step. Example RAMP_X_SPEED START=10000 STOP=22000 STEP=1000
gcode:
    {% set start = params.START|default(10000)|int %}
    {% set stop = params.STOP|default(22000)|int %}
    {% set step = params.STEP|default(1000)|int %}
    {% for f in range(start, stop + 1, step) %}
        {action_respond_info("Testing X at F=%d" % (f,))}
        TEST_MAX_X F={f} PASSES=1
        G4 P500
    {% endfor %}

