[gcode_macro SHOW_POS]
gcode:
    {% set x   = printer.toolhead.position.x %}
    {% set y   = printer.toolhead.position.z %}
    {% set z   = printer["gcode_macro _POSITIONS"].z_height %}
    {% set b   = printer["gcode_macro _POSITIONS"].b_deg %}
    {% set c   = printer["gcode_macro _POSITIONS"].c_deg %}
    {% set xb1 = printer.toolhead.position.x + printer.toolhead.position.y %}
    {% set xb2 = printer.toolhead.position.x - printer.toolhead.position.y %}
    M117 X:{x|round(1)} Y:{y|round(1)} Z:{z|round(1)} B:{b|round(1)} C:{c|round(1)}
    {action_respond_info("X=%.2f Y=%.2f Z=%.2f B=%.2fdeg C=%.2fdeg" % (x, y, z, b, c))}
    {action_respond_info("XB1_motor=%.2f XB2_motor=%.2f" % (xb1, xb2))}

[gcode_macro M114]
rename_existing: M114.1
gcode:
    M114.1
    SHOW_POS

############################################################
# TUNING MACROS
############################################################

[gcode_macro TUNE_Y_SENSORLESS]
description: Tune bed-Y sensorless. Overrun = increase SGTHRS.
gcode:
    {% set current = params.CURRENT|default(0.40)|float %}
    {% set threshold = params.SGTHRS|default(50)|int %}
    {% set speed = params.SPEED|default(40)|float %}
    {action_respond_info("Y TUNE: current=%.3fA SGTHRS=%d speed=%.1fmm/s" % (current, threshold, speed))}
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={current}
    SET_TMC_FIELD STEPPER=stepper_z FIELD=SGTHRS VALUE={threshold}
    SET_TMC_FIELD STEPPER=stepper_z FIELD=TCOOLTHRS VALUE=35000
    G4 P2000
    G28.1 Z
    SET_KINEMATIC_POSITION Z=106.0
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT=0.650
    SET_TMC_FIELD STEPPER=stepper_z FIELD=TCOOLTHRS VALUE=0
    G90
    G1.1 Z96.0 F{speed * 60}

[gcode_macro TUNE_X_SENSORLESS]
description: Tune X sensorless. Overrun = increase SGTHRS.
gcode:
    {% set current = params.CURRENT|default(0.40)|float %}
    {% set threshold = params.SGTHRS|default(80)|int %}
    {% set speed = params.SPEED|default(40)|float %}
    {action_respond_info("X TUNE: current=%.3fA SGTHRS=%d" % (current, threshold))}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={current}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={threshold}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={threshold}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=40000
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=40000
    G4 P2000
    G28.1 X
    SET_KINEMATIC_POSITION X=148.5
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.650
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.650
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=0
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=0
    G90
    G1.1 X138.5 F{speed * 60}

[gcode_macro TUNE_B_SENSORLESS]
description: Tune native B sensorless. Increase SGTHRS if it overruns.
gcode:
    {% set current = params.CURRENT|default(0.40)|float %}
    {% set threshold = params.SGTHRS|default(80)|int %}
    {% set speed = params.SPEED|default(30)|float %}
    {action_respond_info("B TUNE using configured native B home DIAG: current=%.3fA SGTHRS=%d speed=%.1fmm/s" % (current, threshold, speed))}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={current}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={threshold}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={threshold}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=40000
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=40000
    G4 P2000
    G28.1 Y
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.650
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.650
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=0
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=0
    
    {% set limits = printer["gcode_macro _LIMITS"] %}
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=b_deg VALUE={limits.b_home_deg}
    ROTATE_B B=0 SPEED={speed}

