############################################################
# HEATED BED
############################################################

[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF3
control: pid
max_power: 0.95
pid_kp: 54
pid_ki: 0.77
pid_kd: 948
min_temp: 0
max_temp: 120

[verify_heater heater_bed]
check_gain_time: 480
heating_gain: 1
max_error: 200

[temperature_sensor bed_thermistor_2]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF4
min_temp: -120
max_temp: 120

############################################################
# FANS
############################################################

[fan]
pin: !PC0
max_power: 1.0
off_below: 0.99

[heater_fan hotend_fan]
pin: PE5
heater: extruder
heater_temp: 50.0




############################################################
# FIRMWARE RETRACTION (BIQU H2 V2S Lite)
############################################################
[firmware_retraction]
retract_length: 0.5
# H2 V2S Lite only needs 0.4mm to 1.0mm maximum. Do not exceed 1.0mm!
retract_speed: 10
# Because of the 7:1 gear ratio, the motor spins 7 times faster than normal. 10mm/s is plenty fast. 
unretract_extra_length: 0.0
unretract_speed: 10






############################################################
# POSITION TRACKING & DYNAMIC COMPENSATION
############################################################

[gcode_macro _POSITIONS]
variable_b_deg: 0.0
variable_c_deg: 0.0
variable_z_height: 0.0
variable_homed_x: False
variable_homed_y: False
variable_homed_z: False
variable_homed_b: False
gcode:

[gcode_macro _DRYRUN]
variable_enabled: False
variable_z_lift: 10.0
gcode:

[gcode_macro _LIMITS]
variable_x_min: -171.5
variable_x_max: 148.5
variable_y_min: -153.0
variable_y_max: 107.0
variable_z_min: -9.2
variable_z_max: 230
# B-Axis Mapping Inverted: Home is at +90.
variable_b_min_deg: -180
variable_b_max_deg: 90
variable_b_mm_per_360: 120.0
variable_b_home_deg: 90.0
variable_b_home_mm: 45.0
variable_c_mm_per_360: 320.0
variable_z_home_x: 0.0
variable_z_home_y: 0.0
variable_z_home_b: -90.0
variable_z_switch_to_nozzle: -8.15 # was -8.3 
variable_z_post_home_lift: 5.0
gcode:

[gcode_macro _TUNED_LIMITS]
variable_x_f: 999999.0
variable_y_f: 999999.0
variable_z_f: 999999.0
variable_b_f: 999999.0
variable_c_f: 999999.0
gcode:

############################################################
# SENSORLESS CONFIG
############################################################

[gcode_macro _SENSORLESS_CONFIG]
variable_y_homing_current: 0.400
variable_y_run_current: 0.650
variable_y_sgthrs: 50
variable_y_homing_speed: 40
variable_y_retract_dist: 10

variable_x_homing_current: 0.400
variable_x_run_current: 0.650
variable_x_sgthrs: 80
variable_x_homing_speed: 40
variable_x_retract_dist: 10

variable_b_homing_current: 0.300
variable_b_run_current: 0.650
variable_b_sgthrs: 80
variable_b_homing_speed: 30
variable_b_retract_deg: 5
gcode:

############################################################
# REGISTER EXTRA GCODE AXES & STARTUP LOCKS
############################################################

[delayed_gcode _REGISTER_EXTRA_AXES_ON_STARTUP]
initial_duration: 0.1
gcode:
    Z_LOCK
    C_LOCK

[gcode_macro REGISTER_EXTRA_AXES]
gcode:
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=U LIMIT_VELOCITY=25 LIMIT_ACCEL=100
    MANUAL_STEPPER STEPPER=c_axis GCODE_AXIS=V LIMIT_VELOCITY=800 LIMIT_ACCEL=1000

[gcode_macro UNREGISTER_EXTRA_AXES]
gcode:
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=
    MANUAL_STEPPER STEPPER=c_axis GCODE_AXIS=

############################################################
# SYSTEM LOCKS
############################################################

[gcode_macro Z_LOCK]
description: Forces the Z-axis manual stepper to energize and hold position safely
gcode:
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=
    MANUAL_STEPPER STEPPER=z_axis ENABLE=1
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=U LIMIT_VELOCITY=25 LIMIT_ACCEL=100

[gcode_macro C_LOCK]
description: Forces the C-axis manual stepper to energize and hold position safely
gcode:
    MANUAL_STEPPER STEPPER=c_axis GCODE_AXIS=
    MANUAL_STEPPER STEPPER=c_axis ENABLE=1
    MANUAL_STEPPER STEPPER=c_axis GCODE_AXIS=V LIMIT_VELOCITY=800 LIMIT_ACCEL=1000

[gcode_macro Z_UNLOCK]
description: Unlocks the Z-axis motor to allow manual rotation
gcode:
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=
    MANUAL_STEPPER STEPPER=z_axis ENABLE=0
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=U LIMIT_VELOCITY=25 LIMIT_ACCEL=100
    M117 Z-Axis Unlocked

[gcode_macro C_UNLOCK]
description: Unlocks the C-axis motor to allow manual rotation
gcode:
    MANUAL_STEPPER STEPPER=c_axis GCODE_AXIS=
    MANUAL_STEPPER STEPPER=c_axis ENABLE=0
    MANUAL_STEPPER STEPPER=c_axis GCODE_AXIS=V LIMIT_VELOCITY=800 LIMIT_ACCEL=1000
    M117 C-Axis Unlocked

############################################################
# HOME Y (USER Y = INTERNAL Z)
############################################################

[gcode_macro HOME_Y]
gcode:
    {% set config = printer["gcode_macro _SENSORLESS_CONFIG"] %}
    M117 Homing Y...
    {action_respond_info("Homing Y toward MAX=106.0 current=%.3fA SGTHRS=%d" % (config.y_homing_current, config.y_sgthrs))}

    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={config.y_homing_current}
    SET_TMC_FIELD STEPPER=stepper_z FIELD=SGTHRS VALUE={config.y_sgthrs}
    SET_TMC_FIELD STEPPER=stepper_z FIELD=TCOOLTHRS VALUE=35000
    G4 P2000

    G28.1 Z

    SET_KINEMATIC_POSITION Z=107.0
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={config.y_run_current}
    SET_TMC_FIELD STEPPER=stepper_z FIELD=TCOOLTHRS VALUE=0
    G4 P200

    _XBY_TOOLHEAD_MOVE_ABS Z={107.0 - config.y_retract_dist} F={config.y_homing_speed * 60}

    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_y VALUE=True
    M117 Y homed at 96.0

############################################################
# HOME X (USER X = INTERNAL X)
############################################################

[gcode_macro HOME_X]
gcode:
    {% set config = printer["gcode_macro _SENSORLESS_CONFIG"] %}
    M117 Homing X...
    {action_respond_info("Homing X toward MAX=148.5 using both XB motors")}

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={config.x_homing_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={config.x_homing_current}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={config.x_sgthrs}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={config.x_sgthrs}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=40000
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=40000
    G4 P2000

    G28.1 X

    SET_KINEMATIC_POSITION X=148.5
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={config.x_run_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={config.x_run_current}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=0
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=0
    G4 P200

    _XBY_TOOLHEAD_MOVE_ABS X={148.5 - config.x_retract_dist} F={config.x_homing_speed * 60}

    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_x VALUE=True
    M117 X homed at 138.5

############################################################
# Z SWITCH TEST / Z HOME
############################################################

[gcode_macro TEST_Z_SWITCH]
description: Query the Z limit switch state. Run once open, then press by hand and run again.
gcode:
    M117 Query Z switch
    QUERY_ENDSTOPS

[gcode_macro SET_Z_HOME_POSE]
description: Set PREP_Z_HOME pose. Example: SET_Z_HOME_POSE X=0 Y=0 B=-90
gcode:
    {% if 'X' in params %}
        SET_GCODE_VARIABLE MACRO=_LIMITS VARIABLE=z_home_x VALUE={params.X}
    {% endif %}
    {% if 'Y' in params %}
        SET_GCODE_VARIABLE MACRO=_LIMITS VARIABLE=z_home_y VALUE={params.Y}
    {% endif %}
    {% if 'B' in params %}
        SET_GCODE_VARIABLE MACRO=_LIMITS VARIABLE=z_home_b VALUE={params.B}
    {% endif %}
    M117 Z home pose updated

[gcode_macro SET_Z_SWITCH_OFFSET]
description: Set nozzle Z when switch triggers. Example: SET_Z_SWITCH_OFFSET OFFSET=-9.20
gcode:
    {% set offset = params.OFFSET|default(0)|float %}
    SET_GCODE_VARIABLE MACRO=_LIMITS VARIABLE=z_switch_to_nozzle VALUE={offset}
    {action_respond_info("Z switch to nozzle offset set to %.3f mm" % (offset,))}

[gcode_macro DRYRUN_ON]
description: Ignore extrusion/heaters and keep model lifted above bed. Example: DRYRUN_ON ZLIFT=10
gcode:
    {% set zl = params.ZLIFT|default(10)|float %}
    SET_GCODE_VARIABLE MACRO=_DRYRUN VARIABLE=enabled VALUE=True
    SET_GCODE_VARIABLE MACRO=_DRYRUN VARIABLE=z_lift VALUE={zl}
    M117 DRYRUN ON

[gcode_macro DRYRUN_OFF]
description: Restore normal printing behavior
gcode:
    SET_GCODE_VARIABLE MACRO=_DRYRUN VARIABLE=enabled VALUE=False
    M117 DRYRUN OFF

[gcode_macro VERIFY_C_AXIS]
description: Set C=0, then rotate one full turn and back. Put a tape mark on bed and frame to verify.
gcode:
    SET_C_POSITION C=0
    M117 Mark bed and frame, then run
    G4 P1000
    G1 C360 F600
    G4 P1000
    G1 C0 F600

[gcode_macro PREP_Z_HOME]
description: Move to configured X/Y/B pose before Z homing (Fast & Simultaneous)
gcode:
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set prep_spd = params.SPEED|default(9000)|float %}
    G90
    G1 X{limits.z_home_x} Y{limits.z_home_y} B{limits.z_home_b} F{prep_spd}
    M117 Z home position ready

[gcode_macro HOME_Z]
description: Move to configured pose and lower Z until PG10 switch triggers
gcode:
    {% if not printer["gcode_macro _POSITIONS"].homed_y %}
        {action_raise_error("HOME_Z requires Y homed first. Run G28 Y or full G28.")}
    {% endif %}
    {% if not printer["gcode_macro _POSITIONS"].homed_b %}
        {action_raise_error("HOME_Z requires B homed first. Run G28 B or full G28.")}
    {% endif %}

    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set skip_prep = params.SKIP_PREP|default(0)|int %}
    {% set switch_to_nozzle = limits.z_switch_to_nozzle|float %}
    {% set post_lift = limits.z_post_home_lift|float %}

    {% if not skip_prep %}
        M117 Preparing Z home...
        PREP_Z_HOME
        # Tiny pause to let inertia settle before dropping Z
        G4 P300 
    {% endif %}

    M117 Homing Z (Fast pass)...
    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=
    MANUAL_STEPPER STEPPER=z_axis ENABLE=1

    # FAST PASS
    MANUAL_STEPPER STEPPER=z_axis SET_POSITION=235
    MANUAL_STEPPER STEPPER=z_axis MOVE={limits.z_min} SPEED=20 STOP_ON_ENDSTOP=home
    
    # RETRACT 5mm
    M117 Homing Z (Retracting)...
    MANUAL_STEPPER STEPPER=z_axis SET_POSITION=0
    MANUAL_STEPPER STEPPER=z_axis MOVE=5 SPEED=25
    
    # SLOW PASS
    M117 Homing Z (Slow pass)...
    MANUAL_STEPPER STEPPER=z_axis MOVE=-10 SPEED=3 STOP_ON_ENDSTOP=home

    # APPLY OFFSET
    MANUAL_STEPPER STEPPER=z_axis SET_POSITION={switch_to_nozzle}
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=z_height VALUE={switch_to_nozzle}

    MANUAL_STEPPER STEPPER=z_axis MOVE={switch_to_nozzle + post_lift} SPEED=25
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=z_height VALUE={switch_to_nozzle + post_lift}

    MANUAL_STEPPER STEPPER=z_axis GCODE_AXIS=U LIMIT_VELOCITY=25 LIMIT_ACCEL=100
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_z VALUE=True
    M117 Z homed

############################################################
# HOME B (SENSORLESS)
############################################################

[gcode_macro HOME_B]
gcode:
    {% set config = printer["gcode_macro _SENSORLESS_CONFIG"] %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    M117 Homing B...
    {action_respond_info("Homing B toward home stop, calibrated touch=%.1fdeg using configured native B home DIAG, current=%.3fA SGTHRS=%d" % (limits.b_max_deg, config.b_homing_current, config.b_sgthrs))}

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={config.b_homing_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={config.b_homing_current}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={config.b_sgthrs}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={config.b_sgthrs}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=40000
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=40000
    G4 P2000

    G28.1 Y

    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={config.b_run_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={config.b_run_current}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=TCOOLTHRS VALUE=0
    SET_TMC_FIELD STEPPER=stepper_y FIELD=TCOOLTHRS VALUE=0
    G4 P200

    # Native home lands at internal +45mm, calibrated here dynamically
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=b_deg VALUE={limits.b_home_deg}

    {% if config.b_retract_deg|float != 0 %}
        {% set rest_pos = limits.b_home_deg - config.b_retract_deg|float %}
        ROTATE_B B={rest_pos} SPEED={config.b_homing_speed}
    {% else %}
        ROTATE_B B=0 SPEED={config.b_homing_speed}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=homed_b VALUE=True
    M117 B homed
    
    # Auto-Center B after homing sequence
    G90
    G0 B0 F3000

############################################################
# G28
############################################################

[gcode_macro G28]
rename_existing: G28.1
gcode:
    {% set home_x = 'X' in params %}
    {% set home_y = 'Y' in params %}
    {% set home_z = 'Z' in params %}
    {% set home_b = 'B' in params %}
    {% set home_all = (params|length == 0) or (not home_x and not home_y and not home_z and not home_b) %}

    {% if home_x or home_all %}
        HOME_X
    {% endif %}
    {% if home_y or home_all %}
        HOME_Y
    {% endif %}
    {% if home_b or home_all %}
        HOME_B
    {% endif %}
    {% if home_z or home_all %}
        {% if home_all %}
            PREP_Z_HOME
            HOME_Z SKIP_PREP=1
            G90
            G1 Z200 F1000
            G1 B0 F1000
            SET_C_POSITION C=0
        {% else %}
            HOME_Z
        {% endif %}
    {% endif %}

    M117 Homing complete
    SHOW_POS

############################################################
# INTERNAL ABSOLUTE TOOLHEAD MOVE HELPER
############################################################

[gcode_macro _XBY_TOOLHEAD_MOVE_ABS]
gcode:
    SAVE_GCODE_STATE NAME=_xby_abs
    G90
    {% set line = [] %}
    {% if 'X' in params %}
        {% set line = line + ['X' ~ params.X] %}
    {% endif %}
    {% if 'Y' in params %}
        {% set line = line + ['Y' ~ params.Y] %}
    {% endif %}
    {% if 'Z' in params %}
        {% set line = line + ['Z' ~ params.Z] %}
    {% endif %}
    {% if 'U' in params %}
        {% set line = line + ['U' ~ params.U] %}
    {% endif %}
    {% if 'V' in params %}
        {% set line = line + ['V' ~ params.V] %}
    {% endif %}
    {% if 'F' in params %}
        {% set line = line + ['F' ~ params.F] %}
    {% endif %}
    {% if line|length > 0 %}
        G1.1 {line|join(' ')}
    {% endif %}
    RESTORE_GCODE_STATE NAME=_xby_abs

############################################################
# G1 OVERRIDE (NATIVE STATE TRACKING)
############################################################

[gcode_macro G1]
rename_existing: G1.1
gcode:
    {% set has_x = 'X' in params %}
    {% set has_y = 'Y' in params %}
    {% set has_z = 'Z' in params %}
    {% set has_b = 'B' in params %}
    {% set has_c = 'C' in params %}
    {% set has_e = 'E' in params %}
    
    # READ KLIPPER'S NATIVE SPEED TO FIX 50MM/S CAP BUG
    {% set current_f = printer.gcode_move.speed * 60 %}
    {% set feedrate = params.F|default(current_f)|float %}
    
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set tuned = printer["gcode_macro _TUNED_LIMITS"] %}
    
    # Read Klipper's native state directly. Eliminates desync bugs.
    {% set relative = not printer.gcode_move.absolute_coordinates %}
    
    {% set dryrun = printer["gcode_macro _DRYRUN"].enabled %}
    {% set zlift = printer["gcode_macro _DRYRUN"].z_lift|float %}
    {% set capped_f = feedrate %}

    {% if has_x %}{% set capped_f = [capped_f, tuned.x_f]|min %}{% endif %}
    {% if has_y %}{% set capped_f = [capped_f, tuned.y_f]|min %}{% endif %}
    {% if has_z %}{% set capped_f = [capped_f, tuned.z_f]|min %}{% endif %}
    {% if has_b %}{% set capped_f = [capped_f, tuned.b_f]|min %}{% endif %}
    {% if has_c %}{% set capped_f = [capped_f, tuned.c_f]|min %}{% endif %}

    {% set abs_line = [] %}
    {% set rel_line = [] %}

    # --- X AXIS TARGET ---
    {% set tx = printer.toolhead.position.x %}
    {% if has_x %}
        {% if relative %}
            {% set tx = tx + params.X|float %}
        {% else %}
            {% set tx = params.X|float %}
        {% endif %}
        {% set tx = [[tx, limits.x_min]|max, limits.x_max]|min %}
        {% set abs_line = abs_line + ['X' ~ tx] %}
        {% set rel_line = rel_line + ['X' ~ (tx - printer.toolhead.position.x)] %}
    {% endif %}

    # --- Z AXIS IDEAL TARGET ---
    {% set tz = printer["gcode_macro _POSITIONS"].z_height %}
    {% if has_z %}
        {% if relative %}
            {% set tz = tz + params.Z|float %}
        {% else %}
            {% set tz = params.Z|float %}
        {% endif %}
        {% if dryrun %}
            {% set tz = tz + zlift %}
        {% endif %}
        {% set tz = [[tz, limits.z_min]|max, limits.z_max]|min %}
    {% endif %}

    # --- Z TO U MAPPING ---
    {% if has_z %}
        {% set abs_line = abs_line + ['U' ~ tz] %}
        {% set rel_line = rel_line + ['U' ~ (tz - printer["gcode_macro _POSITIONS"].z_height)] %}
    {% endif %}

    {% if has_y %}
        {% if relative %}
            {% set ty = printer.toolhead.position.z + params.Y|float %}
        {% else %}
            {% set ty = params.Y|float %}
        {% endif %}
        {% set ty = [[ty, limits.y_min]|max, limits.y_max]|min %}
        {% set abs_line = abs_line + ['Z' ~ ty] %}
        {% set rel_line = rel_line + ['Z' ~ (ty - printer.toolhead.position.z)] %}
    {% endif %}

    {% if has_b %}
        {% if relative %}
            {% set tb = printer["gcode_macro _POSITIONS"].b_deg + params.B|float %}
        {% else %}
            {% set tb = params.B|float %}
        {% endif %}
        {% set tb = [[tb, limits.b_min_deg]|max, limits.b_max_deg]|min %}
        {% set b_mm = limits.b_home_mm + ((tb - limits.b_home_deg) / 360.0) * limits.b_mm_per_360 %}
        {% set abs_line = abs_line + ['Y' ~ b_mm] %}
        {% set rel_line = rel_line + ['Y' ~ (b_mm - printer.toolhead.position.y)] %}
    {% endif %}

    {% if has_c %}
        {% if relative %}
            {% set tc = printer["gcode_macro _POSITIONS"].c_deg + params.C|float %}
        {% else %}
            {% set tc = params.C|float %}
        {% endif %}
        {% set c_mm = (tc / 360.0) * limits.c_mm_per_360 %}
        {% set c_current_mm = (printer["gcode_macro _POSITIONS"].c_deg / 360.0) * limits.c_mm_per_360 %}
        {% set abs_line = abs_line + ['V' ~ c_mm] %}
        {% set rel_line = rel_line + ['V' ~ (c_mm - c_current_mm)] %}
    {% endif %}

    {% if has_e and not dryrun %}
        {% set abs_line = abs_line + ['E' ~ params.E] %}
        {% set rel_line = rel_line + ['E' ~ params.E] %}
    {% endif %}
    
    {% set abs_line = abs_line + ['F' ~ capped_f] %}
    {% set rel_line = rel_line + ['F' ~ capped_f] %}

    {% if has_x or has_y or has_z or has_b or has_c or has_e %}
        {% if relative %}
            G1.1 {rel_line|join(' ')}
        {% else %}
            G1.1 {abs_line|join(' ')}
        {% endif %}
    {% endif %}

    {% if has_z %}
        SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=z_height VALUE={tz}
    {% endif %}
    {% if has_b %}
        SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=b_deg VALUE={tb}
    {% endif %}
    {% if has_c %}
        SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=c_deg VALUE={tc}
    {% endif %}

[gcode_macro G0]
rename_existing: G0.1
gcode:
    G1 {rawparams}

[gcode_macro G00]
description: Redirects CAM G00 commands to the custom G1 macro
gcode:
    G1 {rawparams}

[gcode_macro G01]
description: Redirects CAM G01 commands to the custom G1 macro
gcode:
    G1 {rawparams}

[gcode_macro G92]
rename_existing: G92.1
gcode:
    {% set std = [] %}
    {% if 'X' in params %}
        {% set std = std + ['X' ~ params.X] %}
    {% endif %}
    {% if 'Y' in params %}
        {% set std = std + ['Z' ~ params.Y] %}
    {% endif %}
    {% if 'Z' in params %}
        {% set std = std + ['U' ~ params.Z] %}
        SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=z_height VALUE={params.Z|float}
    {% endif %}
    {% if 'E' in params %}
        {% set std = std + ['E' ~ params.E] %}
    {% endif %}
    {% if std|length > 0 %}
        G92.1 {std|join(' ')}
    {% endif %}
    {% if 'B' in params %}
        SET_B_POSITION B={params.B}
    {% endif %}
    {% if 'C' in params %}
        SET_C_POSITION C={params.C}
    {% endif %}

############################################################
# B / C MOTION
############################################################

[gcode_macro ROTATE_B]
gcode:
    {% set angle = params.B|default(0)|float %}
    {% set spd = params.SPEED|default(30)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set angle = [[angle, limits.b_min_deg]|max, limits.b_max_deg]|min %}
    {% set b_mm = limits.b_home_mm + ((angle - limits.b_home_deg) / 360.0) * limits.b_mm_per_360 %}
    _XBY_TOOLHEAD_MOVE_ABS Y={b_mm} F={spd * 60}
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=b_deg VALUE={angle}

[gcode_macro ROTATE_C]
gcode:
    {% set angle = params.C|default(0)|float %}
    {% set spd = params.SPEED|default(50)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set c_mm = (angle / 360.0) * limits.c_mm_per_360 %}
    _XBY_TOOLHEAD_MOVE_ABS V={c_mm} F={spd * 60}
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=c_deg VALUE={angle}

############################################################
# MOVE MACROS
############################################################

[gcode_macro MOVE_X]
gcode:
    {% set dist = params.DISTANCE|default(0)|float %}
    {% set spd = params.SPEED|default(50)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set cur_x = printer.toolhead.position.x %}
    {% set new_x = [[cur_x + dist, limits.x_min]|max, limits.x_max]|min %}
    _XBY_TOOLHEAD_MOVE_ABS X={new_x} F={spd * 60}

[gcode_macro MOVE_Y]
gcode:
    {% set dist = params.DISTANCE|default(0)|float %}
    {% set spd = params.SPEED|default(50)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set cur_y = printer.toolhead.position.z %}
    {% set new_y = [[cur_y + dist, limits.y_min]|max, limits.y_max]|min %}
    _XBY_TOOLHEAD_MOVE_ABS Z={new_y} F={spd * 60}

[gcode_macro MOVE_Z]
gcode:
    {% set dist = params.DISTANCE|default(0)|float %}
    {% set spd = params.SPEED|default(20)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set cur_z = printer["gcode_macro _POSITIONS"].z_height %}
    {% set new_z = [[cur_z + dist, limits.z_min]|max, limits.z_max]|min %}
    {% if new_z != cur_z %}
        _XBY_TOOLHEAD_MOVE_ABS U={new_z} F={spd * 60}
        SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=z_height VALUE={new_z}
    {% endif %}

############################################################
# POSITION SET MACROS
############################################################

[gcode_macro SET_X_POSITION]
gcode:
    {% set pos = params.X|default(0)|float %}
    SET_KINEMATIC_POSITION X={pos}

[gcode_macro SET_Y_POSITION]
gcode:
    {% set pos = params.Y|default(0)|float %}
    SET_KINEMATIC_POSITION Z={pos}

[gcode_macro SET_B_POSITION]
gcode:
    {% set angle = params.B|default(0)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set angle = [[angle, limits.b_min_deg]|max, limits.b_max_deg]|min %}
    {% set b_mm = limits.b_home_mm + ((angle - limits.b_home_deg) / 360.0) * limits.b_mm_per_360 %}
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=b_deg VALUE={angle}
    SAVE_GCODE_STATE NAME=_xby_setb
    G90
    G92.1 Y{b_mm}
    RESTORE_GCODE_STATE NAME=_xby_setb

[gcode_macro SET_C_POSITION]
gcode:
    {% set angle = params.C|default(0)|float %}
    {% set limits = printer["gcode_macro _LIMITS"] %}
    {% set c_mm = (angle / 360.0) * limits.c_mm_per_360 %}
    SET_GCODE_VARIABLE MACRO=_POSITIONS VARIABLE=c_deg VALUE={angle}
    SAVE_GCODE_STATE NAME=_xby_setc
    G90
    G92.1 V{c_mm}
    RESTORE_GCODE_STATE NAME=_xby_setc

############################################################
