
############################################################
# printer_xby_working.cfg
# Fully Stable Version 
# Includes: Shifted Y-Zero, Macro Memory Fixes, Thermal 
# Safeties, Extruder Math Fixes, Bed Power Cap, and 
# Inverted B-Axis Mapping (+90 to -180).
# UPDATED: True Geometric Rotary Center Origin Shift Applied
# UPDATED: C-Axis Startup Lock & Manual Unlock Macros
# UPDATED: C-Axis Vibration & Jerk Reduction Applied
# UPDATED: Fixed Sensorless Homing (Single Pass @ 40mm/s)
# UPDATED: Added G0 B0 centering at the end of HOME_B
# UPDATED: Fast & Simultaneous X/Y/B move for PREP_Z_HOME
# UPDATED: Increased Z-Axis Speeds & Added End-of-Print Lift
# UPDATED: Replaced Virtual Coord Mode tracking with Native Klipper State
# UPDATED: Bulletproof Pause/Resume custom axis positional memory
# UPDATED: Eradicated G90.1/G91.1 calls causing homing crash
# UPDATED: Fixed G1 Macro Modal Speed Bug (50mm/s flow rate cap)
############################################################

############################################################
# MCU - BTT Octopus Pro V1.0.1 (H723)
############################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_4B0022000251313239393734-if00

############################################################
# PRINTER
############################################################

[printer]
kinematics: xby
b_home_endstop_axis: x
max_velocity: 600
max_accel: 2000
max_z_velocity: 100
max_z_accel: 1000
square_corner_velocity: 15.0

[force_move]
enable_force_move: true

[virtual_sdcard]
path: /home/saurabh/printer_data/gcodes

[gcode_arcs]
resolution: 1.0


############################################################
# XB1 - Motor5 - INTERNAL X rail
############################################################

[stepper_x]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 148.5
position_min: -171.5
position_max: 148.5
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE4
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG13
driver_SGTHRS: 80

############################################################
# XB2 - Motor6 - INTERNAL B rail
############################################################

[stepper_y]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 45.0
position_min: -45.0
position_max: 45.0
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE1
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG14
driver_SGTHRS: 80

############################################################
# Y PHYSICAL - Motor1 - INTERNAL Z rail
############################################################

[stepper_z]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2209_stepper_z:virtual_endstop
position_endstop: 107.0
position_min: -153.0
position_max: 107.0
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_z]
uart_pin: PD11
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG9
driver_SGTHRS: 50

############################################################
# Z PHYSICAL - Motor0 - MANUAL_STEPPER WITH LIMIT SWITCH
############################################################

[tmc2209 manual_stepper z_axis]
uart_pin: PC4
run_current: 0.800
stealthchop_threshold: 999999

[manual_stepper z_axis]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 8
velocity: 25
accel: 100
endstop_pin: ^PG10

############################################################
# C AXIS - Motor4 (High Speed, Low Vibration Tune)
############################################################

[tmc2209 manual_stepper c_axis]
uart_pin: PF2
run_current: 0.850             # INCREASED: Gives the motor more muscle to brake the heavy mass
stealthchop_threshold: 999999  # ENABLED: Forces whisper-quiet, perfect sine-wave stepping
interpolate: True

[manual_stepper c_axis]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 64
rotation_distance: 32
velocity: 800                  # INCREASED: Raised top speed from 600 to 800
accel: 1000                    # UNCHANGED: Keeps the start/stop gentle to prevent physical frame shock 900 to 1200

############################################################
# EXTRUDER - Motor7
############################################################






[extruder]
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
microsteps: 16
rotation_distance: 3.433
nozzle_diameter: 0.4
filament_diameter: 1.75
max_extrude_cross_section: 20
heater_pin: PA3
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF5
control: pid
pid_kp: 22
pid_ki: 1.08
pid_kd: 114
min_temp: 0
max_temp: 300
max_extrude_only_distance: 100.0

[tmc2209 extruder]
uart_pin: PD3
run_current: 0.600
sense_resistor: 0.110
stealthchop_threshold: 999999




